description = "Session Transcript — write verbatim chronological transcript to project root as aichat-<slug>.md"
prompt = "Run Session Transcript. Determine feature slug from $ARGUMENTS if provided, otherwise use project root directory name. Scan the project root — do NOT create any new folders. Reconstruct conversation chronologically, labeled by User/Agent — verbatim, no summarization. If context is truncated, say so. If aichat-<slug>.md exists, append under new dated section instead of overwriting. Output: write to aichat-<slug>.md in project root. Reference: $ARGUMENTS"
